name: search_plus
description: >
  A production-grade, highly customizable Flutter search package supporting
  async API search, local/offline search, hybrid search, rich UI, theming,
  animations, and localization.
version: 1.0.0
homepage: https://github.com/yasersabri580-oss/search_plus
repository: https://github.com/yasersabri580-oss/search_plus
issue_tracker: https://github.com/yasersabri580-oss/search_plus/issues

environment:
  sdk: ^3.10.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
